specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: pg-and-e
providerId: pg-and-e
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Energy
  - Utilities
  - Share My Data
  - Green Button
notes: PG&E does not publish numeric rate limits for its Share My Data API on a public developer
  documentation site. Limits, polling cadence, and quota are defined per third-party registration
  in coordination with PG&E and constrained by the Green Button / CMD specification.
description: PG&E's Share My Data API follows the Green Button / Connect My Data standard. Throttling
  and quota are managed via the third-party registration relationship rather than published
  numeric per-key limits. Standard 429 / 503 responses apply on throttling; consumers should
  follow Green Button best practices for batched daily / hourly retrieval rather than
  high-frequency polling.
sources:
  - https://www.pge.com/en/partners-and-suppliers/data-requests-research-and-academics/share-my-data.html
  - https://sharemydata.pge.com/
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Share My Data API
    scope: third-party registration
    metric: varies
    limit: 'governed by third-party agreement; not publicly documented'
    notes: Daily / hourly batch retrieval is the normal pattern; high-frequency polling is not
      expected.
policies:
  - name: Green Button / CMD Conformance
    description: Clients should follow the Green Button Connect My Data conformance requirements
      for usage retrieval (typically daily or hourly batch).
  - name: Customer Authorization Lifecycle
    description: Each customer's authorization is time-limited; clients must handle revocation and
      re-authorization rather than retrying.
  - name: Backoff
    description: On 429 / 503, retry with exponential backoff and jitter; do not exceed normal
      Green Button retrieval cadence.
maintainers: []
