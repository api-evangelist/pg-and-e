meters:
  - name: third_party_registration
    description: Registered third-party Share My Data integration with PG&E. Subject to CPUC
      tariffs / fees; not metered per-call.
    unit: registration
    aggregation: count
    dimensions:
      - third_party
  - name: customer_authorization
    description: Customer-authorized data subscription under a registered third party.
    unit: customer_consent
    aggregation: count
    dimensions:
      - third_party
      - service_type
principles:
  - name: Visibility
    description: Track Share My Data subscriptions and customer authorizations via the third-party
      portal; reconcile any tariff fees with PG&E billing.
  - name: Allocation
    description: Allocate any tariff fee to the consuming line of business (energy program, demand
      response, research / academic); track per customer subscription where authorization is
      granted.
  - name: Optimization
    description: Use Green Button daily / hourly batch retrieval rather than high-frequency
      polling; cache historical usage locally to minimize repeat retrievals.
  - name: Accountability
    description: Third-party-side program owner and PG&E business contact jointly own the
      registration lifecycle and tariff compliance.
maintainers: []
