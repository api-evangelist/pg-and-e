modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Energy
  - Utilities
  - Share My Data
  - Green Button
notes: PG&E's Share My Data is a regulated B2B data-sharing program rather than a commercial API
  product. There is no published per-call price book to model. This artifact captures the FinOps
  shape only at the third-party registration level.
description: FOCUS-aligned FinOps placeholder for PG&E. PG&E is a regulated electric and gas utility
  whose primary API surface is the Share My Data / Green Button platform. Any fees are tariff- and
  regulator-driven rather than a self-service price book. No metered SKU is publicly modellable.
sources:
  - https://www.pge.com/en/partners-and-suppliers/data-requests-research-and-academics/share-my-data.html
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Pacific Gas and Electric Company
serviceCategory: Utilities Data
billingModel:
  pricingCategory: Regulated Tariff
  billingFrequency: Per-Tariff
  billingCurrency: USD
  chargeCategories:
    - Purchase
focusColumns:
  ServiceName: PG&E Share My Data
  ServiceCategory: Utilities Data
  ServiceSubcategory: Energy Usage Data
