description: >-
  Pacific Gas and Electric Company (PG&E) is one of the largest combined natural gas and electric energy companies in
  the United States, serving approximately 16 million people in northern and central California. PG&E offers the Share
  My Data API, a Green Button Connect My Data implementation providing customer- authorized access to energy usage
  interval data for both electricity and gas through RESTful web services.
