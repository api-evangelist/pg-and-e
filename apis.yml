    description: >-
      The PG&E Share My Data API provides customer-authorized access to energy usage data following the Energy Service
      Provider Interface (ESPI) standard and Green Button Connect My Data specification. Third-party companies can
      access interval data for both electricity and gas usage through RESTful web services with OAuth 2.0 authorization.
