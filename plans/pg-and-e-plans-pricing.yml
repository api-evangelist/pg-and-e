notes: PG&E's "Share My Data" program is the customer-authorized data sharing platform aligned with
  the Green Button / CMD (Connect My Data) standard. It is not a public, self-service developer API
  with published pricing. Onboarding requires registration as a Third Party (and customer
  authorization) under California Public Utilities Commission rules. There is no published
  per-call price; PG&E may charge fees that are governed by tariff / regulatory filings rather
  than a public pricing page. The single Contact Sales / Onboarding plan below reflects that
  regulated B2B reality.
description: PG&E (Pacific Gas and Electric Company) is a California regulated utility. Its primary
  external API is the Share My Data / Green Button platform, which exposes customer-authorized
  energy usage data to third parties registered under the CPUC framework. There is no public,
  self-service price book for the API; access is gated by third-party registration, customer
  authorization, and applicable CPUC tariffs.
sources:
  - https://www.pge.com/en/partners-and-suppliers/data-requests-research-and-academics/share-my-data.html
  - https://sharemydata.pge.com/
plans:
  - id: pg-and-e-share-my-data-third-party
    name: Share My Data - Third Party Registration
    type: enterprise
    description: Regulated third-party access to PG&E customer energy usage data via the Share My
      Data / Green Button (Connect My Data) program. Requires third-party registration with PG&E
      and explicit customer authorization. Any fees follow PG&E's CPUC tariff filings rather than
      a public pricing page.
    entries:
      - label: Third-Party Registration
        name: third_party_registration
        type: flat
        metric: registration
        limit: 1
        timeFrame: usage
        geo: CA
        unit: 1
        price: contact PG&E (regulated tariff)
        userMultiplied: false
      - label: Customer Authorization
        name: customer_authorization
        type: quota
        metric: customer_consent
        limit: -1
        timeFrame: usage
        geo: CA
        unit: 1
        price: 'no per-customer fee documented'
        userMultiplied: false
    elements:
      - name: Green Button / CMD Compliant
      - name: Customer-Authorized Usage Data
      - name: OAuth-Based Authorization
      - name: CPUC Regulated Access
